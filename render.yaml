# Render Blueprint — https://dashboard.render.com/select-repo?type=blueprint
services:
  - type: web
    name: zerdali-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://zerdali-app.vercel.app,http://localhost:3000,http://127.0.0.1:3000
      - key: PASSWORD_RESET_REDIRECT_URL
        sync: false
